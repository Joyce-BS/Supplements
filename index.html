<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#22685f">
    <meta name="description" content="家用补剂查询清单，适合手机大字查看。">
    <title>补剂查询</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="top-bar">
      <div>
        <p class="eyebrow">家用清单</p>
        <h1>补剂查询</h1>
      </div>
      <button class="install-button" id="installButton" type="button" hidden>添加到主屏幕</button>
    </header>

    <main>
      <section class="search-area" aria-label="搜索补剂">
        <label for="searchInput">搜索中文名、德文名或成分</label>
        <div class="search-row">
          <input id="searchInput" type="search" autocomplete="off" placeholder="例如：维生素D、Magnesium、钙">
          <button id="clearButton" type="button">清空</button>
        </div>
        <p id="resultCount" class="result-count" aria-live="polite"></p>
      </section>

      <section id="statusArea" class="status-area" aria-live="polite"></section>
      <section id="cards" class="cards" aria-label="补剂列表"></section>
    </main>
  </body>
</html>
