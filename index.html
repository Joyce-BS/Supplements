<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#22685f">
    <meta name="description" content="补剂、药品和眼药水清单，适合手机大字查看。">
    <title>妈妈的健康抽屉</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="top-bar">
      <div>
        <p class="eyebrow">瓶瓶罐罐不用猜</p>
        <h1>妈妈的健康抽屉</h1>
        <p class="subtitle">补剂、药品和眼药水，不靠记忆，点开就知道。</p>
      </div>
      <button class="install-button" id="installButton" type="button" hidden>添加到主屏幕</button>
    </header>

    <main>
      <section class="search-area" aria-label="搜索清单">
        <label for="searchInput">想找哪一瓶？</label>
        <div class="search-row">
          <input id="searchInput" type="search" autocomplete="off" placeholder="输入中文、德文或成分都可以">
          <button id="clearButton" type="button">清空</button>
        </div>
        <p id="resultCount" class="result-count" aria-live="polite"></p>
      </section>

      <section id="statusArea" class="status-area" aria-live="polite"></section>
      <section id="cards" class="cards" aria-label="补剂列表"></section>

      <section class="element-section" aria-labelledby="elementTitle">
        <div class="section-heading">
          <p class="eyebrow">成分小词典</p>
          <h2 id="elementTitle">这些名字，到底管什么？</h2>
          <p>按常见程度排好，点开看几句重点。</p>
        </div>
        <div id="elementsList" class="elements-list"></div>
      </section>
    </main>
  </body>
</html>
